<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CLICKY GAME</title>
  <link rel="stylesheet" href="style.css" />
  
</head>
<body>
  <canvas id="fireworks" style="position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:1000;"></canvas>
  <div id="win-fade"></div>
  <div id="starfield"></div>
  <div id="crt-overlay"></div>

  <header>
  <div class="stats-group">
  <span class="stat-item">HITS <strong><span id="score">0</span></strong></span>
  <span class="stat-divider">|</span>
  <span class="stat-item">MISSES <strong><span id="mistakes">0</span></strong></span>
</div>
    <div class="centre-group">
  <button id="deselect" type="button" onclick="deselect()" disabled>Deselect</button>
  <div class="selected-display">Selected: <span id="selected">-</span></div>
  <button type="button" onclick="sortMerged()">Sort Merged</button>
  <button type="button" onclick="shuffleUnmerged()">Shuffle</button>
</div>
    <div class="header-buttons">
      <button type="button" onclick="goHome()">Home</button>
      <button id="reset-btn" type="button" onclick="confirmReset()">Reset</button>
    </div>
  </div>
</header>

  <div class="game-layout">
  <aside class="commands-panel" id="commands-panel">
    <h3>Commands</h3>
    <ul>
      <li><kbd>Click</kbd> Select a tile</li>
      <li><kbd>Click again</kbd> Deselect</li>
      <li><kbd>Ctrl+Click</kbd> Hold selection after merge</li>
      <li><kbd>Sort Merged</kbd> Move completed categories to top</li>
      <li><kbd>Reset</kbd> Restart puzzle</li>
    </ul>
  </aside>
  <main id="board"></main>
</div>

  <div id="win-banner">
    <span>Y</span><span>O</span><span>U</span><span>&nbsp;</span>
    <span>W</span><span>I</span><span>N</span><span>!</span>
  </div>

  
  
  

<div id="tile-tooltip"></div>
<canvas id="dotdance"></canvas>
<button id="return-to-board">Return to Puzzle</button>

<script src="./game.js"></script>
</body>
</html>
