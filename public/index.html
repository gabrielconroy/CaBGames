<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Puzzle Hub</title>
  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      max-width: 1000px;
      margin: 0 auto;
      padding: 24px;
      line-height: 1.4;
    }

    textarea {
      width: 100%;
      max-width: 100%;
      min-height: 280px;
      font-family: Consolas, Monaco, monospace;
      font-size: 13px;
    }

    input {
      width: 100%;
      max-width: 420px;
      padding: 8px;
      font-size: 14px;
    }

    button {
      margin-top: 10px;
      margin-right: 8px;
      padding: 8px 12px;
      font-size: 14px;
      cursor: pointer;
    }
	
	.upload-cta {
  margin: 20px 0 30px 0;
  text-align: center;
}

.upload-button {
  display: inline-block;
  padding: 18px 32px;
  font-size: 20px;
  font-weight: bold;
  background: #2563eb;
  color: white;
  text-decoration: none;
  border-radius: 10px;
  transition: all 0.2s ease;
}

.upload-button:hover {
  background: #1d4ed8;
  transform: translateY(-1px);
}

.upload-button:active {
  transform: translateY(0);
}

    #status {
      margin-top: 12px;
      min-height: 22px;
      font-weight: bold;
    }

    .ok {
      color: #166534;
    }

    .err {
      color: #b91c1c;
    }

    .muted {
      color: #666;
      font-size: 14px;
    }

    .puzzle {
      border: 1px solid #ddd;
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
    }

    .empty {
      color: #666;
      font-style: italic;
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <h1>🧩 Puzzle Hub</h1>

  <h2>Create</h2>

<div class="upload-cta">
  <a href="/validator.html" class="upload-button">
    ➕ Upload New Puzzle
  </a>
  <div class="muted">Use the validator tool to create and upload puzzles</div>
</div>

  <h2>Browse</h2>
  <div id="list"></div>


<script>

    async function load() {
      const res = await fetch("/api/puzzles");
      const puzzles = await res.json();

      const list = document.getElementById("list");
      list.innerHTML = "";

      if (!puzzles.length) {
        list.innerHTML = `<div class="empty">No puzzles uploaded yet.</div>`;
        return;
      }

      puzzles.forEach(p => {
        const div = document.createElement("div");
        div.className = "puzzle";

        const rating = Number(p.rating || 0);
        const votes = Number(p.votes || 0);

        div.innerHTML = `
          <b>${escapeHtml(p.name)}</b>
<div class="muted">by ${escapeHtml(p.author || "Anonymous")}</div>
          <div>⭐ ${rating.toFixed(2)} (${votes} vote${votes === 1 ? "" : "s"})</div>
          <button onclick="play(${p.id})">Play</button>
          <button onclick="rate(${p.id},5)">Rate 5</button>
          <button onclick="rate(${p.id},4)">Rate 4</button>
          <button onclick="rate(${p.id},3)">Rate 3</button>
          <button onclick="rate(${p.id},2)">Rate 2</button>
          <button onclick="rate(${p.id},1)">Rate 1</button>
        `;

        list.appendChild(div);
      });
    }

      async function play(id) {
  console.log("Navigating to puzzle:", id);
  window.location.href = "/game?id=" + encodeURIComponent(id);
}

    async function rate(id, value) {
      await fetch("/api/rate", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ id, rating: value })
      });

      load();
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    load();
  </script>

</body>
</html>
